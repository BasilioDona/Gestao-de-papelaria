<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estoque - Sistema Papelaria</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">

    <header class="topbar">
      <div class="topbar-titulo">
        <span id="nome-usuario"></span>
        <span id="tipo-usuario" class="badge"></span>
      </div>
      <button id="btn-logout" class="btn-secundario">Sair</button>
    </header>

    <nav class="menu-lateral">
      <a href="dashboard.html">Dashboard</a>
      <a href="produtos.html">Produtos</a>
      <a href="estoque.html" class="ativo">Estoque</a>
      <a href="clientes.html">Clientes</a>
      <a href="servicos.html">Serviços</a>
      <a href="vendas.html">Vendas (PDV)</a>
      <a href="caixa.html">Caixa</a>
      <a href="relatorios.html">Relatórios</a>
      <a href="usuarios.html" id="link-usuarios">Usuários</a>
      <a href="configuracoes.html" id="link-config">Configurações</a>
    </nav>

    <main class="conteudo">
      <div class="cabecalho-pagina">
        <h1>Estoque</h1>
        <button id="btn-nova-movimentacao" class="btn-primario">+ Movimentação</button>
      </div>

      <div class="campo-busca">
        <input type="text" id="busca-movimentacao" placeholder="Buscar por produto...">
      </div>

      <div id="lista-movimentacoes" class="tabela-container">
        <p class="lista-vazia">Carregando histórico...</p>
      </div>
    </main>

  </div>

  <!-- MODAL DE MOVIMENTAÇÃO -->
  <div id="modal-movimentacao" class="modal-overlay escondido">
    <div class="modal-box">
      <h2>Nova Movimentação</h2>
      <form id="form-movimentacao">

        <div class="campo">
          <label for="mov-produto">Produto *</label>
          <select id="mov-produto" required>
            <option value="">Selecione...</option>
          </select>
        </div>

        <div class="campo">
          <label for="mov-tipo">Tipo *</label>
          <select id="mov-tipo" required>
            <option value="">Selecione...</option>
            <option value="entrada">Entrada</option>
            <option value="saida">Saída</option>
            <option value="ajuste">Ajuste</option>
            <option value="inventario">Inventário</option>
          </select>
        </div>

        <div class="campo escondido" id="bloco-tipo-registro-estoque">
          <label>Como deseja registrar?</label>
          <select id="mov-tipo-registro">
            <option value="unidade">Em unidades</option>
            <option value="embalagem">Em embalagens (ex: caixas)</option>
          </select>
        </div>

        <div class="campo">
          <label for="mov-quantidade" id="label-mov-quantidade">Quantidade *</label>
          <input type="number" id="mov-quantidade" min="0" required>
          <span id="dica-mov-quantidade" class="dica-campo"></span>
        </div>

        <div class="campo escondido" id="bloco-preview-conversao">
          <span class="dica-campo" id="dica-conversao-embalagem"></span>
        </div>

        <div class="campo">
          <label for="mov-motivo">Motivo / observação</label>
          <input type="text" id="mov-motivo" placeholder="Ex: compra de fornecedor, produto danificado...">
        </div>

        <div id="modal-mensagem-erro" class="mensagem-erro"></div>

        <div class="modal-botoes">
          <button type="button" id="btn-cancelar-modal" class="btn-secundario-claro">Cancelar</button>
          <button type="submit" class="btn-primario">Registrar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="estoque.js"></script>
</body>
</html>
