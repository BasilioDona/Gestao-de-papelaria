<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuários - Sistema Papelaria</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">

    <header class="topbar">
      <button class="btn-menu-toggle" id="btn-menu-toggle" aria-label="Abrir menu">☰</button>
      <div class="topbar-titulo">
        <span id="nome-usuario"></span>
        <span id="tipo-usuario" class="badge"></span>
      </div>
      <button id="btn-logout" class="btn-secundario">Sair</button>
    </header>

    <nav class="menu-lateral">
      <a href="dashboard.html">Dashboard</a>
      <a href="produtos.html">Produtos</a>
      <a href="estoque.html">Estoque</a>
      <a href="clientes.html">Clientes</a>
      <a href="servicos.html">Serviços</a>
      <a href="vendas.html">Vendas (PDV)</a>
      <a href="caixa.html">Caixa</a>
      <a href="relatorios.html">Relatórios</a>
      <a href="usuarios.html" class="ativo" id="link-usuarios">Usuários</a>
      <a href="configuracoes.html" id="link-config">Configurações</a>
    </nav>

    <main class="conteudo">
      <div class="cabecalho-pagina">
        <h1>Usuários</h1>
        <button id="btn-novo-usuario" class="btn-primario">+ Novo Funcionário</button>
      </div>

      <div id="lista-usuarios" class="tabela-container">
        <p class="lista-vazia">Carregando usuários...</p>
      </div>
    </main>

  </div>

  <!-- MODAL: NOVO FUNCIONÁRIO -->
  <div id="modal-usuario" class="modal-overlay escondido">
    <div class="modal-box">
      <h2>Novo Funcionário</h2>
      <form id="form-usuario">
        <div class="campo">
          <label for="usuario-nome">Nome *</label>
          <input type="text" id="usuario-nome" required>
        </div>
        <div class="campo">
          <label for="usuario-email">E-mail *</label>
          <input type="email" id="usuario-email" required>
        </div>
        <div class="campo">
          <label for="usuario-senha">Senha *</label>
          <input type="password" id="usuario-senha" required minlength="6">
          <span class="dica-campo">Mínimo de 6 caracteres. Anote para repassar ao funcionário.</span>
        </div>
        <div class="campo">
          <label for="usuario-tipo">Tipo *</label>
          <select id="usuario-tipo" required>
            <option value="funcionario">Funcionário</option>
            <option value="administrador">Administrador</option>
          </select>
        </div>
        <div id="modal-mensagem-erro" class="mensagem-erro"></div>
        <div class="modal-botoes">
          <button type="button" id="btn-cancelar-modal" class="btn-secundario-claro">Cancelar</button>
          <button type="submit" class="btn-primario">Criar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="usuarios.js"></script>
</body>
</html>
