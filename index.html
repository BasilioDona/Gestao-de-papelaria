<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sistema Papelaria</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="login-container">
    <div class="login-box">
      <h1>SISTEMA DE GESTÃO - PAPELARIA</h1>
      <p class="subtitle">Gestão inteligente e integrada. Faça login para começar</p>

      <form id="form-login">
        <div class="campo">
          <label for="email">E-mail</label>
          <input type="email" id="email" required placeholder="seuemail@exemplo.com">
        </div>

        <div class="campo">
          <label for="senha">Senha</label>
          <input type="password" id="senha" required placeholder="Sua senha">
        </div>

        <div id="mensagem-erro" class="mensagem-erro"></div>

        <button type="submit" id="btn-login">Entrar</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
</body>
</html>
